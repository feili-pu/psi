# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/psi?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 启用SQL脚本自动执行
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.sql.init.schema-locations=classpath:psi_database_init.sql,classpath:sql/data_normalization.sql
spring.sql.init.data-locations=
spring.sql.init.encoding=utf-8

# MyBatis配置
mybatis.type-aliases-package=com.lifei.psi.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.com.lifei.psi.mapper=debug

# Swagger/OpenAPI配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.default-model-expand-depth=1
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true
springdoc.packages-to-scan=com.lifei.psi.controller
springdoc.show-actuator=false
